# Déploiement backend jurilux-insight (insight.jurilux.lu).
#
# Choix délibéré : ce produit est un FORK de jurilux-api partageant le MÊME corpus.
# On NE relance donc PAS un second Meilisearch/Ollama : on RÉUTILISE la stack de
# jurilux-api déjà en place sur le VPS (Meili publié sur 127.0.0.1:7700). Ici, seul
# le service `api` tourne, sur le port 8089 (8088 est pris par jurilux-api), avec sa
# PROPRE base SQLite (comptes/insight isolés de jurilux-api).
#
# Prérequis VPS : la stack jurilux-api (meilisearch) doit être up ; /opt/jurilux-insight/.env présent.
services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:8088"        # host 8089 -> conteneur 8088
    # Atteindre le Meili/Ollama de la stack jurilux-api via la passerelle hôte.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEILI_URL: ${MEILI_URL:-http://host.docker.internal:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?définir MEILI_MASTER_KEY dans .env}
      MEILI_INDEX: ${MEILI_INDEX:-chunks}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?définir ANTHROPIC_API_KEY dans .env}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PROMPT_VERSION: ${PROMPT_VERSION:-rebuild-2026-07-v1}
      HYBRID_SEMANTIC_RATIO: ${HYBRID_SEMANTIC_RATIO:-0.0}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      DB_PATH: /var/lib/jurilux/jurilux-insight.db
    volumes:
      - insight_data:/var/lib/jurilux   # base SQLite propre à insight (persistant)

volumes:
  insight_data:
