services:
  meilisearch:
    image: getmeili/meilisearch:v1.15
    restart: unless-stopped
    # Index ~1,3 M docs : le reindex (embedders) mappe beaucoup de fichiers LMDB.
    # ulimit par défaut (1024) => "too_many_open_files" et tâche settingsUpdate échoue.
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?définir MEILI_MASTER_KEY dans .env}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Embeddings locaux (recherche sémantique) — BGE-M3 via Ollama, 0 € / souverain.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_INDEX: ${MEILI_INDEX:-chunks}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?définir ANTHROPIC_API_KEY dans .env}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      PROMPT_VERSION: ${PROMPT_VERSION:-rebuild-2026-07-v1}
      # Recherche hybride (sémantique + mots-clés). 0 = mots-clés seuls.
      # 0.5 activé le 2026-07-04 : embedder OpenAI sur lois+projets (~109k chunks)
      # => les textes de loi sont enfin retrouvés malgré le fossé de vocabulaire.
      HYBRID_SEMANTIC_RATIO: ${HYBRID_SEMANTIC_RATIO:-0.0}
      # Backoffice : emails admin (séparés par des virgules) — amorce le 1er admin.
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      DB_PATH: /var/lib/jurilux/jurilux.db
    volumes:
      - app_data:/var/lib/jurilux   # base SQLite (comptes, historique) — persistant
    depends_on:
      meilisearch:
        condition: service_healthy

volumes:
  meili_data:
  app_data:
  ollama_data:
