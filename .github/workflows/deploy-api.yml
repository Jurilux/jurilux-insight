# Déploiement backend jurilux-insight (insight.jurilux.lu) — même mécanique SSH que jurilux-api
# (alias deploytarget + user deploy en dur : évite les 2 bugs de quoting résolus).
# Secrets requis (repo jurilux-insight) : DEPLOY_HOST, DEPLOY_SSH_KEY.
# Prérequis VPS : la stack jurilux-api (Meilisearch) up ; /opt/jurilux-insight/.env présent.
#
# Rollback : Actions → « Run workflow » → renseigner `ref` avec un tag pour redéployer cette version.
name: Deploy Insight API (VPS OVH)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref à déployer (tag/branche/SHA). Vide = ref courante."
        required: false
        default: ""

concurrency:
  group: deploy-insight-api
  cancel-in-progress: true

jobs:
  # Gate qualité : les tests doivent passer avant tout déploiement.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        # Tests fonctionnels désactivés temporairement (rapidité de déploiement) :
        # tests/test_functional.py pèse ~100s sur ~120s. On garde le contrat d'API rapide.
        # Réactiver : retirer --ignore (relancer la suite complète en local avant merge).
        run: pytest -q --ignore=tests/test_functional.py

  deploy:
    needs: test
    # Ne déploie jamais depuis une PR : uniquement push sur main ou déclenchement manuel.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup SSH
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          {
            echo "Host deploytarget"
            echo "  HostName $HOST"
            echo "  User deploy"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "diag: host_len=${#HOST} key_len=${#KEY}"

      - name: Sync sources
        run: |
          ssh deploytarget "sudo mkdir -p /opt/jurilux-insight && sudo chown -R deploy:deploy /opt/jurilux-insight"
          rsync -az --delete --exclude '.env' --exclude 'data/' --exclude '.git' ./ deploytarget:/opt/jurilux-insight/

      - name: Build & restart
        run: |
          ssh deploytarget "cd /opt/jurilux-insight && test -f .env || { echo 'ERREUR: /opt/jurilux-insight/.env manquant'; exit 1; }"
          # Garder l'image courante comme :previous → rollback instantané possible.
          ssh deploytarget "sudo docker image tag jurilux-insight-api:latest jurilux-insight-api:previous 2>/dev/null || true"
          ssh deploytarget "cd /opt/jurilux-insight && sudo docker compose up -d --build"
          ssh deploytarget "printf '%s\n' '${{ github.event.inputs.ref || github.sha }}' | sudo tee /opt/jurilux-insight/.deployed_ref >/dev/null"

      - name: Smoke test
        run: |
          ssh deploytarget 'for i in $(seq 1 15); do curl -sf http://127.0.0.1:8089/health && exit 0; sleep 2; done; echo "health: KO (stack jurilux-api/Meili up ? docker compose logs)"; exit 1' \
            && echo "health: OK"
